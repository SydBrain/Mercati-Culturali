<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moti Rurali — Mappa Interattiva</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
  <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Barlow+Condensed:ital,wght@0,300;0,400;0,600;0,700;1,400&display=swap"
    rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="./media/logos/Marker_mappa_1.png" type="image/x-icon" />
</head>

<body>

  <header id="site-header">
    <div class="header-inner">
      <div class="brand">
        <h1 class="brand-title">Moti Rurali</h1>
        <span class="brand-sub">Pratiche Artistiche In Transito</span>
      </div>
      <div class="header-divider" aria-hidden="true"></div>
      <div class="header-logo">
        <img src="/media/logos/LOGO_MC.png" alt="Mercati Culturali" class="mercati-logo" />
      </div>
    </div>
  </header>

  <main>
    <div id="map-container">
      <div id="map"></div>
    </div>
  </main>

  <div id="station-panel" class="station-panel" role="dialog" aria-modal="true" hidden>
    <button class="panel-close" id="panel-close" aria-label="Chiudi">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M1 1L13 13M13 1L1 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
      </svg>
    </button>
    <div class="panel-image-wrap">
      <img id="panel-img" src="" alt="" class="panel-image" />
      <div class="panel-image-overlay"></div>
    </div>
    <div class="panel-body">
      <p class="panel-label">Tappa</p>
      <h2 id="panel-title" class="panel-title"></h2>
      <div class="panel-audio-wrap">
        <div class="audio-player">
          <button class="audio-play-btn" id="audio-play-btn" aria-label="Play/Pausa">
            <svg class="icon-play" viewBox="0 0 24 24" fill="currentColor">
              <path d="M8 5v14l11-7z" />
            </svg>
            <svg class="icon-pause" viewBox="0 0 24 24" fill="currentColor" style="display:none">
              <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
            </svg>
          </button>
          <div class="audio-progress-wrap">
            <div class="audio-progress-bar">
              <div class="audio-progress-fill" id="audio-fill"></div>
              <div class="audio-progress-thumb" id="audio-thumb"></div>
            </div>
            <div class="audio-times">
              <span id="audio-current">0:00</span>
              <span id="audio-duration">0:00</span>
            </div>
          </div>
        </div>
        <audio id="hidden-audio" preload="none"></audio>
      </div>
    </div>
  </div>

  <script type="module" src="script.js"></script>

</body>

</html>
